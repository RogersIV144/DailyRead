general:
  language: zh_cn
  note_language_policy: zh_analysis_en_terms
  timezone: Asia/Shanghai

storage:
  papers_root: ./papers
  ideas_root: ./ideas
  reports_root: ./reports
  inbox_root: ./inbox
  templates_root: ./templates
  index_root: ./index
  config_root: ./config
  attachments_root: ./attachments

taxonomy:
  fixed_topics:
    - architecture
    - systems
    - distributed_systems
    - network
    - security
    - ai_systems
    - embodied_systems
  tag_guidelines:
    - Keep tags short, specific, and reusable across notes.
    - Prefer method, system, benchmark, and problem tags over vague topic labels.
    - Reuse existing tags before introducing a new one.
    - Use `venue:*` style tags only when venue-level grouping is useful.
    - Keep one primary topic in `topics` and use `tags` for secondary signals.
    - Avoid duplicating the same concept in both `topics` and `tags` unless needed for search.

search:
  default_sort: balanced
  default_year_window: recent_90d
  default_max_results: 10
  search_scopes:
    - papers
    - ideas
  fuzzy_title_match: true
  semantic_search_enabled: false
  deduplicate_by_paper_key: true

scoring:
  daily_discovery:
    relevance: 0.35
    recency: 0.25
    impact: 0.15
    quality: 0.25
  venue_survey:
    relevance: 0.35
    rigor: 0.25
    impact: 0.20
    venue_fit: 0.20
  idea_synthesis:
    gap_strength: 0.30
    feasibility: 0.25
    novelty: 0.25
    leverage: 0.20
  report_writer:
    synthesis: 0.40
    clarity: 0.25
    actionability: 0.35

tracks:
  enabled_tracks:
    - architecture
    - systems
    - distributed_systems
    - network
    - security
    - ai_systems
  definitions:
    architecture:
      display_name: Architecture
      description: Computer architecture, accelerators, memory hierarchy, and performance analysis.
    systems:
      display_name: Systems
      description: Operating systems, storage, resource management, and system software.
    distributed_systems:
      display_name: Distributed Systems
      description: Distributed systems, cloud infrastructure, datacenter systems, and service design.
    network:
      display_name: Networking
      description: Network systems, traffic measurement, transport, and networked infrastructure.
    security:
      display_name: Security
      description: Systems security, network security, platform security, and secure system design.
    ai_systems:
      display_name: AI Systems
      description: AI infrastructure, training systems, inference serving, and ML systems engineering.
    embodied_systems:
      display_name: Embodied Systems
      description: Embodied AI and robotics-adjacent systems. Preserved in config but disabled by default.

tasks:
  daily_discovery:
    enabled: true
    default_track: systems
    default_output_mode: survey_report
    default_template: survey_report
    default_year_window: recent_90d
    max_results: 10
    include_keywords: []
    exclude_keywords: []
  venue_survey:
    enabled: true
    default_track: systems
    default_output_mode: survey_report
    default_template: survey_report
    default_year_window: recent_5y
    max_results: 20
    include_keywords: []
    exclude_keywords: []
  paper_analyze:
    enabled: true
    default_track: systems
    default_output_mode: paper_note
    default_template: deep_paper_note
    default_year_window: all_years
    max_results: 1
    include_keywords: []
    exclude_keywords: []
  idea_synthesis:
    enabled: true
    default_track: systems
    default_output_mode: idea_notes
    default_template: idea_note
    default_year_window: recent_365d
    max_results: 5
    include_keywords: []
    exclude_keywords: []
  report_writer:
    enabled: true
    default_track: systems
    default_output_mode: report
    default_template: hybrid_report
    default_year_window: recent_365d
    max_results: 10
    include_keywords: []
    exclude_keywords: []
  paper_search:
    enabled: true
    default_track: systems
    default_output_mode: list
    default_template: ''
    default_year_window: all_years
    max_results: 10
    include_keywords: []
    exclude_keywords: []
  extract_paper_images:
    enabled: true
    default_track: systems
    default_output_mode: asset_list
    default_template: ''
    default_year_window: all_years
    max_results: 20
    include_keywords: []
    exclude_keywords: []

